services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vitalgoal
      POSTGRES_PASSWORD: vitalgoal
      POSTGRES_DB: vitalgoal
      PGPORT: 5435
    ports:
      - "5435:5435"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalgoal -p 5435"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
